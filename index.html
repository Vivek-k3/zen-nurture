<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="https://fav.farm/👶" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen Nurture</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "sage": "#7C9082",
              "sage-light": "#E8ECE9",
              "oat": "#F5F2EB",
              "espresso": "#4A4238",
              "clay": "#C98D75",
              "surface": "#FFFFFF",
              "muted": "#9C9488",
              "dusty-blue": "#8CA9B3",
              "alert-red": "#D67C7C",
              "night": "#2C3E50"
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"]
            },
            borderRadius: {
              "DEFAULT": "1rem",
              "lg": "2rem",
              "xl": "3rem",
              "2xl": "4rem",
              "full": "9999px"
            },
            animation: {
              "pulse-soft": "pulse-soft 2s infinite",
            },
            keyframes: {
              "pulse-soft": {
                "0%": { boxShadow: "0 0 0 0 rgba(124, 144, 130, 0.4)" },
                "70%": { boxShadow: "0 0 0 10px rgba(124, 144, 130, 0)" },
                "100%": { boxShadow: "0 0 0 0 rgba(124, 144, 130, 0)" }
              }
            }
          },
        },
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      .custom-scrollbar::-webkit-scrollbar {
          width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
          background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
          background: #E0DCD5;
          border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: #CUC8C0;
      }
      input[type=range] {
          -webkit-appearance: none;
          background: transparent;
      }
      input[type=range]::-webkit-slider-thumb {
          -webkit-appearance: none;
          height: 24px;
          width: 24px;
          border-radius: 50%;
          background: #7C9082;
          cursor: pointer;
          margin-top: -10px;
          box-shadow: 0 0 10px rgba(124, 144, 130, 0.5);
          border: 2px solid #F5F2EB;
      }
      input[type=range]::-webkit-slider-runnable-track {
          width: 100%;
          height: 4px;
          cursor: pointer;
          background: #E0DCD5;
          border-radius: 999px;
      }
      input[type=range]:focus::-webkit-slider-runnable-track {
          background: #D0CCC5;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-oat font-display text-espresso overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
